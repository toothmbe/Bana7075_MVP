<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bike Rental Demand Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.4rem;
      color: #1a202c;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #718096;
      margin-bottom: 1.75rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .full-width { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #2d3748;
      background: #f7fafc;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4299e1;
      background: white;
    }

    button {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.75rem;
      background: #3182ce;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #2b6cb0; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    .result {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-size: 1rem;
      display: none;
    }

    .result.success {
      background: #ebf8ff;
      border: 1px solid #bee3f8;
      color: #2c5282;
    }

    .result.error {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
    }

    .prediction-number {
      font-size: 2rem;
      font-weight: 700;
      color: #2b6cb0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bike Rental Demand Predictor</h1>
    <p class="subtitle">Enter conditions to predict hourly bike rental count</p>

    <form id="predictForm">
      <div class="grid">

        <div class="full-width">
          <label for="datetime">Date &amp; Time</label>
          <input type="datetime-local" id="datetime" required />
        </div>

        <div>
          <label for="season">Season</label>
          <select id="season">
            <option value="1">Spring</option>
            <option value="2" selected>Summer</option>
            <option value="3">Fall</option>
            <option value="4">Winter</option>
          </select>
        </div>

        <div>
          <label for="weather">Weather</label>
          <select id="weather">
            <option value="1" selected>Clear / Partly Cloudy</option>
            <option value="2">Mist / Cloudy</option>
            <option value="3">Light Rain or Snow</option>
            <option value="4">Heavy Rain / Severe</option>
          </select>
        </div>

        <div>
          <label for="holiday">Holiday</label>
          <select id="holiday">
            <option value="0" selected>No</option>
            <option value="1">Yes</option>
          </select>
        </div>

        <div>
          <label for="workingday">Working Day</label>
          <select id="workingday">
            <option value="0">No</option>
            <option value="1" selected>Yes</option>
          </select>
        </div>

        <div>
          <label for="temp">Temperature (°C)</label>
          <input type="number" id="temp" step="0.01" value="15.00" required />
        </div>

        <div>
          <label for="atemp">Feels Like (°C)</label>
          <input type="number" id="atemp" step="0.01" value="16.00" required />
        </div>

        <div>
          <label for="humidity">Humidity (%)</label>
          <input type="number" id="humidity" min="0" max="100" value="60" required />
        </div>

        <div>
          <label for="windspeed">Wind Speed</label>
          <input type="number" id="windspeed" step="0.01" min="0" value="10.00" required />
        </div>

      </div>

      <button type="submit" id="submitBtn">Predict Demand</button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    const API_URL = "https://bana7075-group10-api.onrender.com";

    // Set datetime default to now
    const now = new Date();
    now.setMinutes(0, 0, 0);
    document.getElementById("datetime").value = now.toISOString().slice(0, 16);

    document.getElementById("predictForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const btn = document.getElementById("submitBtn");
      const resultDiv = document.getElementById("result");

      btn.disabled = true;
      btn.textContent = "Predicting...";
      resultDiv.style.display = "none";

      const datetimeLocal = document.getElementById("datetime").value;
      const datetimeFormatted = datetimeLocal.replace("T", " ") + ":00";

      const payload = {
        records: [{
          datetime: datetimeFormatted,
          season: parseInt(document.getElementById("season").value),
          holiday: parseInt(document.getElementById("holiday").value),
          workingday: parseInt(document.getElementById("workingday").value),
          weather: parseInt(document.getElementById("weather").value),
          temp: parseFloat(document.getElementById("temp").value),
          atemp: parseFloat(document.getElementById("atemp").value),
          humidity: parseInt(document.getElementById("humidity").value),
          windspeed: parseFloat(document.getElementById("windspeed").value),
        }],
        round_to_int: true
      };

      try {
        const resp = await fetch(`${API_URL}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await resp.json();

        if (data.predictions && data.predictions.length > 0) {
          resultDiv.className = "result success";
          resultDiv.innerHTML = `
            <div>Predicted bike rentals</div>
            <div class="prediction-number">${data.predictions[0]}</div>
            <div style="font-size:0.8rem;margin-top:0.25rem;color:#4a90a4">bikes in this hour</div>
          `;
        } else {
          resultDiv.className = "result error";
          resultDiv.textContent = data.error || "Unexpected response from API.";
        }
      } catch (err) {
        resultDiv.className = "result error";
        resultDiv.textContent = "Could not reach the API. It may be starting up — wait 30 seconds and try again.";
      }

      resultDiv.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Predict Demand";
    });
  </script>
</body>
</html>
